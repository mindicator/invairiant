name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token stored. PyPI trusts THIS repo's
# publish.yml via the trusted (pending) publisher configured at pypi.org.
#   - a published GitHub release auto-publishes that tag's version;
#   - workflow_dispatch publishes the checked-out ref (use it for the first
#     publish, and any manual re-run).
# The build here is the same one the CI packaging smoke already proves.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # OIDC — this is what replaces the PyPI token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build + check sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
