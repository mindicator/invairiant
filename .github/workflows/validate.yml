name: Validate Framework

# Dogfoods invAIriant's own contracts: schemas parse, example configs and
# findings validate against them, and every lens file keeps its structure.
# See scripts/validate_framework.py.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install --quiet jsonschema pyyaml

      - name: Run framework self-validation
        run: python3 scripts/validate_framework.py

      - name: CLI smoke test (validate-config / validate-report)
        run: |
          python3 cli/invairiant.py validate-config invairiant.config.yml examples/*/invairiant.config.yml case-studies/*/invairiant.config.yml
          python3 cli/invairiant.py validate-report examples/infra-service/example-report.json docs/audits/2026-07-03-self-audit.json case-studies/*/report.json

      - name: CLI smoke test (validate-report semantic catches an inconsistency)
        run: |
          python3 - <<'PY' > /tmp/bad-report.json
          import json
          d = json.load(open('docs/audits/2026-07-03-self-audit.json'))
          d['findings'][0]['severity'] = 'S0'   # now an open S0, but verdict is 'pass'
          json.dump(d, open('/tmp/bad-report.json','w'))
          PY
          if python3 cli/invairiant.py validate-report /tmp/bad-report.json; then
            echo "semantic linter should have failed on S0-with-pass"; exit 1
          fi
          echo "validate-report semantic linter correctly failed"

      - name: CLI smoke test (ci-gate must FAIL on the S0 example)
        run: |
          if python3 cli/invairiant.py ci-gate examples/infra-service/example-report.json; then
            echo "ci-gate should have failed on an S0 report"; exit 1
          fi
          echo "ci-gate correctly failed on open S0/S1"

      - name: CLI smoke test (record + history over committed memory)
        run: |
          python3 cli/invairiant.py record docs/audits/2026-07-03-self-audit.json --dir /tmp/hist
          python3 cli/invairiant.py history --dir /tmp/hist | grep -q 'lens score history' || { echo "history failed"; exit 1; }
          python3 cli/invairiant.py history | grep -q 'parnas' || { echo "committed history unreadable"; exit 1; }
          echo "record + history OK"

      - name: CLI smoke test (render-comment -> paste-ready PR comment)
        run: |
          out=$(python3 cli/invairiant.py render-comment docs/audits/2026-07-03-self-audit.json)
          echo "$out" | grep -q '\*\*Verdict:\*\*' || { echo "render-comment missing verdict"; exit 1; }
          echo "render-comment OK"

      - name: CLI smoke test (collect -> valid evidence bundle)
        run: |
          mkdir -p .invairiant/cache
          python3 cli/invairiant.py collect --out .invairiant/cache/bundle.json
          python3 - <<'PY'
          import json
          from jsonschema import Draft202012Validator
          schema = json.load(open('schemas/evidence-bundle.schema.json'))
          data = json.load(open('.invairiant/cache/bundle.json'))
          errs = list(Draft202012Validator(schema).iter_errors(data))
          assert not errs, errs
          print('evidence bundle valid;', sum(len(v) for v in data['signals'].values()), 'signals')
          PY
