name: "invAIriant audit gate"
description: "Validate an invAIriant audit report, verify its provenance binding, render it into the job summary, and fail CI on open S0/S1 findings."
branding:
  icon: "shield"
  color: "purple"

inputs:
  report:
    description: "Path (in your repo) to the audit report JSON to validate and gate on."
    required: false
    default: ""
  max-severity:
    description: "ci-gate blocking level: S1 (default, blocks S0+S1) or S0 (blocks only S0)."
    required: false
    default: "S1"
  require-provenance:
    description: 'If "true", fail when the report carries no provenance block (default: warn only — staged rollout of issue #2).'
    required: false
    default: "false"
  collect:
    description: 'If "true", also generate an evidence bundle at invairiant-bundle.json (for artifact upload / an agent step).'
    required: false
    default: "false"
  scope:
    description: "bounded scope for collect: working | range | commit | module | adr | rp | pr | repo (empty = working, or range if 'range' is set)."
    required: false
    default: ""
  range:
    description: "git range for collect, e.g. origin/main...HEAD (--scope range)."
    required: false
    default: ""
  commit:
    description: "commit sha for collect (--scope commit)."
    required: false
    default: ""
  pr:
    description: "pull-request number for collect (--scope pr; needs a GitHub remote + gh/token or the pull ref)."
    required: false
    default: ""
  path:
    description: "module dir/file, ADR file, or refactoring-proposal file for collect (--scope module|adr|rp)."
    required: false
    default: ""
  narrow:
    description: "restrict an adr/rp scope's code to this subtree (--narrow)."
    required: false
    default: ""
  invairiant-ref:
    description: "Git ref of mindicator/invairiant to run (tag/branch/sha)."
    required: false
    default: "v0.2.5"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Fetch the invAIriant framework
      shell: bash
      run: |
        set -euo pipefail
        git clone --depth 1 --branch "${{ inputs.invairiant-ref }}" \
          https://github.com/mindicator/invairiant "$RUNNER_TEMP/invairiant"
        echo "INVAIRIANT_HOME=$RUNNER_TEMP/invairiant" >> "$GITHUB_ENV"
        python -m pip install --quiet jsonschema pyyaml

    - name: Collect evidence bundle (optional)
      if: ${{ inputs.collect == 'true' }}
      shell: bash
      env:                       # pass via env — never interpolate inputs into the script
        IN_SCOPE: ${{ inputs.scope }}
        IN_RANGE: ${{ inputs.range }}
        IN_COMMIT: ${{ inputs.commit }}
        IN_PR: ${{ inputs.pr }}
        IN_PATH: ${{ inputs.path }}
        IN_NARROW: ${{ inputs.narrow }}
      run: |
        set -euo pipefail
        args=(collect --out invairiant-bundle.json)
        if [ -n "$IN_SCOPE" ];  then args+=(--scope  "$IN_SCOPE");  fi
        if [ -n "$IN_RANGE" ];  then args+=(--range  "$IN_RANGE");  fi
        if [ -n "$IN_COMMIT" ]; then args+=(--commit "$IN_COMMIT"); fi
        if [ -n "$IN_PR" ];     then args+=(--pr     "$IN_PR");     fi
        if [ -n "$IN_PATH" ];   then args+=(--path   "$IN_PATH");   fi
        if [ -n "$IN_NARROW" ]; then args+=(--narrow "$IN_NARROW"); fi
        python "$INVAIRIANT_HOME/cli/invairiant.py" "${args[@]}"

    - name: Validate report (schema + semantic)
      if: ${{ inputs.report != '' }}
      shell: bash
      run: python "$INVAIRIANT_HOME/cli/invairiant.py" validate-report "${{ inputs.report }}"

    - name: Verify provenance (report ↔ commit ↔ bundle)
      if: ${{ inputs.report != '' }}
      shell: bash
      env:                       # pass via env — never interpolate inputs into the script
        REPORT: ${{ inputs.report }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        REQUIRE: ${{ inputs.require-provenance }}
        REF: ${{ inputs.invairiant-ref }}
      run: |
        set -euo pipefail
        CLI="$INVAIRIANT_HOME/cli/invairiant.py"
        # `verify-provenance` is newer than some pinned `invairiant-ref` values
        # (e.g. the default release tag before it shipped). If the resolved CLI
        # doesn't have the subcommand, skip cleanly instead of failing the build.
        if ! python "$CLI" verify-provenance --help >/dev/null 2>&1; then
          echo "note: 'verify-provenance' is not available in invairiant-ref '$REF' —"
          echo "      skipping provenance verification (bump invairiant-ref to enable it)."
          exit 0
        fi
        args=(verify-provenance "$REPORT")
        # pull_request checkouts are a synthetic merge ref — bind to the PR head sha.
        if [ -n "${HEAD_SHA:-}" ];               then args+=(--commit "$HEAD_SHA"); fi
        # compare against the bundle freshly collected this run, if any.
        if [ -f invairiant-bundle.json ];        then args+=(--bundle invairiant-bundle.json); fi
        if [ "${REQUIRE:-false}" = "true" ];     then args+=(--require); fi
        python "$CLI" "${args[@]}"

    - name: Render report into the job summary
      if: ${{ always() && inputs.report != '' }}
      shell: bash
      run: |
        python "$INVAIRIANT_HOME/cli/invairiant.py" render-comment "${{ inputs.report }}" \
          >> "$GITHUB_STEP_SUMMARY" || true

    - name: Gate on open S0/S1
      if: ${{ inputs.report != '' }}
      shell: bash
      run: |
        python "$INVAIRIANT_HOME/cli/invairiant.py" ci-gate "${{ inputs.report }}" \
          --max-severity "${{ inputs.max-severity }}"
